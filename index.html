<html> 
<head>
	<title>Colecao</title>
</head>

<style>
	* {
		padding: 0;
		margin: 0;
		box-sizing: border-box;
	}

	body {
		height: 100%;
		width: 100%;
		background-color: rgb(129, 129, 129);
		font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
	}

	.nav {
		width: 100%;
		height: 10vh;
		background-color: rgb(21, 65, 0);
	}

		display: flex;

		justify-content: center;
	}

	.item {

		width: 30vh;
		margin: 20px;
	}

	.imagem {

		height:  70%;

		height: 100%;
	}

	}

<body> 

	<nav class="nav">

		</div>

	<section >

		<div class="item">
			<img class="imagem" src="./assets/1.jpg" alt="">
			<h1>Controle de movimento do playstation 3</h1>
		</div>

		<h1>Nintendo 3ds</h1>
		<div class="item">
			<img class="imagem" src="./assets/2.jpg" alt="">
			<h1>Console portatil da Nintendo</h1>
		</div>


		<h1>Nintendo N64</h1>
		<div class="item">
			<img class="imagem" src="./assets/3.jpg" alt="">
			<h1>PRIMEIRO video game 3d nintendo</h1>
		</div>


		<h1>SUPER FAMICOM</h1>
		<div class="item">
			
			<img class="imagem" src="./assets/4.jpg" alt="">
